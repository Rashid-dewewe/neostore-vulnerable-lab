<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log in | NeoStore</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="/css/tokens.css" rel="stylesheet"/>
</head>
<body>
<nav id="site-nav" class="border-b" style="border-color:var(--color-outline);background:var(--color-surface-container-lowest)"></nav>

<main class="max-w-sm mx-auto px-6 py-16">
  <h1 class="font-display text-2xl font-bold mb-1">Welcome back</h1>
  <p class="text-sm mb-6" style="color:var(--color-on-surface-variant)">Log in to your NeoStore account.</p>

  <form id="login-form" class="flex flex-col gap-3">
    <input id="email" type="email" required class="input" placeholder="Email"/>
    <input id="password" type="password" required class="input" placeholder="Password"/>
    <button type="submit" class="btn-primary mt-2">Log in</button>
  </form>
  <p id="error" class="text-sm mt-3" style="color:var(--color-error)"></p>

  <a href="/forgot-password.html" class="text-sm underline mt-4 inline-block">Forgot password?</a>
  <p class="text-sm mt-6">No account? <a href="/register.html" class="underline">Register</a></p>
</main>

<script src="/js/api.js"></script>
<script>
renderNav();

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('error').textContent = '';
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    try {
        const data = await api('/auth/login', {
            method: 'POST',
            body: { email, password }
        });
        
        Auth.setSession(data.token, data.user);
        toast('Welcome back, ' + data.user.full_name + '!', 'success');
        
        // Redirect based on role
        if (data.user.role === 'admin' || data.user.role === 'support') {
            setTimeout(() => {
                window.location.href = '/admin/dashboard.html';
            }, 500);
        } else {
            setTimeout(() => {
                window.location.href = '/index.html';
            }, 500);
        }
    } catch (err) {
        document.getElementById('error').textContent = err.message;
        toast(err.message, 'error');
    }
});
</script>
</body>
</html>
