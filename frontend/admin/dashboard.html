<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Management Console | NeoStore</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="/css/tokens.css" rel="stylesheet"/>
</head>
<body>
<nav id="site-nav" class="border-b" style="border-color:var(--color-outline);background:var(--color-surface-container-lowest)"></nav>

<div class="max-w-6xl mx-auto px-6 py-10">
  <h1 class="font-display text-2xl font-bold mb-1">Admin Console</h1>
  <p class="text-sm mb-6" style="color:var(--color-on-surface-variant)">Internal System Administrative Context Hub</p>

  <div class="mb-6 flex gap-2 border-b" style="border-color:var(--color-outline)">
    <button class="tab-btn px-4 py-2 font-medium text-sm" data-tab="customers">Customers</button>
    <button class="tab-btn px-4 py-2 font-medium text-sm" data-tab="inventory">Inventory</button>
    <button class="tab-btn px-4 py-2 font-medium text-sm" data-tab="roles">System Privilege Access</button>
  </div>

  <div id="tab-content" class="card p-6"></div>
</div>

<script src="/js/api.js"></script>
<script>
renderNav();
let activeTab = 'customers';

async function renderTab() {
  const content = document.getElementById('tab-content');
  content.innerHTML = '<p class="text-sm font-mono animate-pulse">Requesting authority clearance state...</p>';
  
  try {
    if (activeTab === 'customers') {
      const data = await api('/admin/customers');
      content.innerHTML = `
        <h2 class="font-display text-lg font-bold mb-4">Customer Directory Mapping</h2>
        <div class="overflow-x-auto"><table class="w-full text-left text-sm">
          <thead><tr class="border-b text-xs uppercase text-neutral-400">
            <th class="py-2">ID</th><th class="py-2">Name</th><th class="py-2">Email</th><th class="py-2">Role Status</th>
          </tr></thead>
          <tbody>${data.map(c => `<tr class="border-b">
            <td class="py-2.5 font-mono text-xs">${c.id}</td><td class="py-2.5">${c.full_name}</td><td class="py-2.5">${c.email}</td><td class="py-2.5 font-mono text-xs">${c.role}</td>
          </tr>`).join('')}</tbody>
        </table></div>`;
    } 
    else if (activeTab === 'inventory') {
      const data = await api('/admin/products');
      content.innerHTML = `
        <h2 class="font-display text-lg font-bold mb-4">Stock Ledger System</h2>
        <div class="overflow-x-auto"><table class="w-full text-left text-sm">
          <thead><tr class="border-b text-xs uppercase text-neutral-400">
            <th class="py-2">Item ID</th><th class="py-2">Name</th><th class="py-2">Price Value</th><th class="py-2">Current Stock</th><th class="py-2">Actions</th>
          </tr></thead>
          <tbody>${data.map(p => `<tr class="border-b" data-id="${p.id}">
            <td class="py-2.5 font-mono text-xs">${p.id}</td>
            <td class="py-2.5 font-medium">${p.name}</td>
            <td class="py-2.5"><input type="number" class="price-input input !w-24 !py-1" value="${p.price}"/></td>
            <td class="py-2.5"><input type="number" class="stock-input input !w-20 !py-1" value="${p.stock}"/></td>
            <td class="py-2.5"><button class="btn-primary save-product-btn !py-1 !px-3 text-xs">Save Updates</button></td>
          </tr>`).join('')}</tbody>
        </table></div>`;
      wireInventory();
    } 
    else if (activeTab === 'roles') {
      content.innerHTML = `
        <h2 class="font-display text-lg font-bold mb-2">Modify Security Role Assignment</h2>
        <p class="text-xs mb-4 text-neutral-400">Direct directory security overrides require explicit system permission levels.</p>
        <div class="max-w-xs flex flex-col gap-3">
          <input id="promote-id" class="input" placeholder="Entity Target ID"/>
          <select id="promote-role" class="input">
            <option value="customer">Customer Access Level</option>
            <option value="support">Support Agent Access Level</option>
            <option value="admin">Global Administrator Access Level</option>
          </select>
          <button id="promote-btn" class="btn-primary mt-1">Execute State Elevation</button>
          <pre id="promote-result" class="text-xs font-mono mt-2 p-2 bg-neutral-100 rounded"></pre>
        </div>`;
      wireRoles();
    }
  } catch (err) {
    content.innerHTML = `<p class="text-sm text-red-600 font-medium">Access Error: ${err.message}</p>`;
  }
}

function wireInventory() {
  document.querySelectorAll('.save-product-btn').forEach(btn => btn.addEventListener('click', async () => {
    const row = btn.closest('tr');
    const id = row.dataset.id;
    const price = Number(row.querySelector('.price-input').value);
    const stock = Number(row.querySelector('.stock-input').value);
    try {
      await api(`/admin/products/${id}`, { method: 'PUT', body: { price, stock } });
      toast('Product metrics aligned successfully', 'success');
    } catch (e) { toast(e.message, 'error'); }
  }));
}

function wireRoles() {
  document.getElementById('promote-btn').addEventListener('click', async () => {
    try {
      const data = await api(`/admin/users/${document.getElementById('promote-id').value}/promote`, {
        method: 'POST',
        body: { role: document.getElementById('promote-role').value },
      });
      document.getElementById('promote-result').textContent = JSON.stringify(data, null, 2);
    } catch (e) { document.getElementById('promote-result').textContent = e.message; }
  });
}

document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => { 
  activeTab = b.dataset.tab; 
  renderTab(); 
}));
renderTab();
</script>
</body>
</html>
