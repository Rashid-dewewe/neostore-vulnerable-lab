<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checkout | NeoStore</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="/css/tokens.css" rel="stylesheet"/>
</head>
<body>
<nav id="site-nav" class="border-b" style="border-color:var(--color-outline);background:var(--color-surface-container-lowest)"></nav>

<main class="max-w-3xl mx-auto px-6 py-12">
  <h1 class="font-display text-2xl font-bold mb-6">Checkout Verification</h1>

  <div id="items" class="flex flex-col gap-2 mb-6"></div>

  <div class="card p-5 flex flex-col gap-3">
    <label class="text-sm font-medium">Shipping address</label>
    <input id="address" required class="input mb-2" placeholder="123 Security Blvd, Cyber City"/>

    <label class="text-sm font-medium">Promo Voucher Code</label>
    <input id="coupon" class="input mb-2" placeholder="e.g. SAVE10"/>

    <label class="text-sm font-medium">Payment Details</label>
    <input id="card" required class="input" placeholder="4111 2222 3333 4444"/>
    
    <div class="flex justify-between items-center border-t pt-4 mt-2">
      <span class="text-sm font-medium">Total Billable Amount</span>
      <span id="sum-subtotal" class="font-display text-lg font-bold">$0.00</span>
    </div>

    <button id="place-order" class="btn-primary mt-4 w-full">Finalize Purchase Order</button>
    <pre id="result" class="text-xs font-mono mt-4 text-emerald-600 whitespace-pre-wrap"></pre>
  </div>
</main>

<script src="/js/api.js"></script>
<script>
renderNav();
let items = [];
try {
  items = JSON.parse(sessionStorage.getItem('neostore_checkout_items')) || [];
} catch {}

function renderItems() {
  const container = document.getElementById('items');
  if(!items.length) {
    container.innerHTML = `<p class="text-sm text-neutral-500">Order buffer clear.</p>`;
    return;
  }
  container.innerHTML = items.map((item, idx) => `
    <div class="card p-4 flex justify-between items-center" data-idx="${idx}" data-price="${item.price}" data-pid="${item.product_id}" data-name="${item.name}">
      <div>
        <div class="font-medium text-sm">${item.name}</div>
        <div class="text-xs text-neutral-400">Qty: ${item.quantity}</div>
      </div>
      <span class="text-sm font-semibold">${money(item.price * item.quantity)}</span>
    </div>
  `).join('');
  updateSubtotal();
}

function updateSubtotal() {
  const subtotal = items.reduce((s, i) => s + i.price * i.quantity, 0);
  document.getElementById('sum-subtotal').textContent = money(subtotal);
}

renderItems();

document.getElementById('place-order').addEventListener('click', async () => {
  if (!items.length) return;
  const coupon_codes = document.getElementById('coupon').value
    .split(',').map(s => s.trim()).filter(Boolean);
  try {
    const order = await api('/checkout', {
      method: 'POST',
      body: {
        items: items.map(i => ({ product_id: i.product_id, name: i.name, price: i.price, quantity: i.quantity })),
        coupon_codes,
        shipping_address: document.getElementById('address').value,
        payment: { card_number: document.getElementById('card').value },
      },
    });
    document.getElementById('result').textContent = `Order ${order.order_number} Processed successfully. Total charged: ${money(order.total)}`;
    sessionStorage.removeItem('neostore_checkout_items');
    toast(`Order complete`, 'success');
  } catch (e) {
    document.getElementById('result').textContent = e.message;
  }
});
</script>
</body>
</html>
