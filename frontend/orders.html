<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orders | NeoStore</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<link href="/css/tokens.css" rel="stylesheet"/>
</head>
<body>
<nav id="site-nav" class="border-b" style="border-color:var(--color-outline);background:var(--color-surface-container-lowest)"></nav>

<main class="max-w-3xl mx-auto px-6 py-12">
  <h1 class="font-display text-2xl font-bold mb-6">Your orders</h1>
  <div id="order-list" class="flex flex-col gap-2"></div>
</main>

<script src="/js/api.js"></script>
<script>
renderNav();
if (!requireLoginOrRedirect()) {}

function statusBadge(s) {
  const cls = s === 'delivered' || s === 'paid' ? 'badge-success' : s === 'cancelled' ? 'badge-warn' : 'badge-neutral';
  return `<span class="badge ${cls}">${s}</span>`;
}

async function load() {
  const orders = await api('/orders');
  document.getElementById('order-list').innerHTML = orders.length ? orders.map(o => `
    <a href="javascript:void(0)" class="card p-4 flex justify-between items-center order-row" data-id="${o.id}">
      <div>
        <div class="font-mono text-sm">${o.order_number}</div>
        <div class="text-xs" style="color:var(--color-on-surface-variant)">${new Date(o.created_at).toLocaleDateString()}</div>
      </div>
      ${statusBadge(o.status)}
      <span class="font-medium">${money(o.total)}</span>
    </a>`).join('') : '<p style="color:var(--color-on-surface-variant)">No orders yet.</p>';

  document.querySelectorAll('.order-row').forEach(row => row.addEventListener('click', () => {
    document.getElementById('lookup-id').value = row.dataset.id;
    document.getElementById('lookup-btn').click();
  }));
}
load();
</script>
</body>
</html>
