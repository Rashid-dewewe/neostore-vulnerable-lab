<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile | NeoStore</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<link href="/css/tokens.css" rel="stylesheet"/>
</head>
<body>
<nav id="site-nav" class="border-b" style="border-color:var(--color-outline);background:var(--color-surface-container-lowest)"></nav>

<main class="max-w-2xl mx-auto px-6 py-12">
  <h1 class="font-display text-2xl font-bold mb-6">Your profile</h1>
  <div id="profile-card" class="card p-5"></div>
</main>

<script src="/js/api.js"></script>
<script>
renderNav();
if (!requireLoginOrRedirect()) {}
const user = Auth.getUser();

async function load() {
  const me = await api(`/users/${user.id}`);
  document.getElementById('profile-card').innerHTML = `
    <div class="flex justify-between"><span class="text-sm" style="color:var(--color-on-surface-variant)">Name</span><span class="font-medium">${me.full_name}</span></div>
    <div class="flex justify-between mt-2"><span class="text-sm" style="color:var(--color-on-surface-variant)">Email</span><span class="font-mono text-sm">${me.email}</span></div>
    <div class="flex justify-between mt-2"><span class="text-sm" style="color:var(--color-on-surface-variant)">Role</span><span class="badge badge-neutral">${me.role}</span></div>
    <div class="flex justify-between mt-2"><span class="text-sm" style="color:var(--color-on-surface-variant)">Loyalty points</span><span class="font-mono text-sm">${me.loyalty_points}</span></div>
  `;
}
load();
</script>
</body>
</html>
