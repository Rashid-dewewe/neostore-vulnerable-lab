<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Profile | NeoStore</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles -->
    <link href="/css/tokens.css" rel="stylesheet"/>
    <link href="/css/main.css" rel="stylesheet"/>
</head>
<body>
<nav id="site-nav" class="border-b" style="border-color:var(--color-outline);background:var(--color-surface-container-lowest)"></nav>

<main class="max-w-2xl mx-auto px-6 py-12">
  <h1 class="font-display text-2xl font-bold mb-6">Your profile</h1>
  <div id="profile-card" class="card p-5"></div>
  <div id="error-message" class="text-sm mt-4" style="color:var(--color-error)"></div>
</main>

<script src="/js/api.js"></script>
<script>
renderNav();

if (!Auth.isLoggedIn()) {
    document.getElementById('error-message').textContent = 'Please log in to view your profile.';
    toast('Please log in first', 'error');
    setTimeout(() => window.location.href = '/login.html', 1500);
} else {
    loadProfile();
}

async function loadProfile() {
    const user = Auth.getUser();
    const card = document.getElementById('profile-card');
    const errorEl = document.getElementById('error-message');
    
    if (!user || !user.id) {
        errorEl.textContent = 'User data not found. Please log in again.';
        return;
    }
    
    try {
        const me = await api(`/users/${user.id}`);
        
        card.innerHTML = `
            <div class="flex items-center gap-4 mb-6">
                <div class="w-16 h-16 rounded-full bg-[#0041c8] text-white flex items-center justify-center text-2xl font-bold">${me.full_name.charAt(0)}</div>
                <div>
                    <h3 class="font-['Geist'] text-xl font-bold">${me.full_name}</h3>
                    <p class="text-[#434656]">${me.email}</p>
                    <span class="inline-block px-3 py-0.5 bg-[#dce1ff] text-[#0041c8] rounded-full text-xs font-medium mt-1">${me.role}</span>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="border border-[#e0e3e5] rounded-lg p-4">
                    <p class="text-xs text-[#434656] uppercase tracking-wider">Phone</p>
                    <p class="font-medium">${me.phone || 'Not provided'}</p>
                </div>
                <div class="border border-[#e0e3e5] rounded-lg p-4">
                    <p class="text-xs text-[#434656] uppercase tracking-wider">Loyalty Points</p>
                    <p class="font-['Geist'] text-2xl font-bold text-[#0041c8]">${me.loyalty_points || 0}</p>
                </div>
                <div class="border border-[#e0e3e5] rounded-lg p-4">
                    <p class="text-xs text-[#434656] uppercase tracking-wider">Member Since</p>
                    <p class="font-medium">${new Date(me.created_at).toLocaleDateString()}</p>
                </div>
                <div class="border border-[#e0e3e5] rounded-lg p-4">
                    <p class="text-xs text-[#434656] uppercase tracking-wider">Account Status</p>
                    <p class="font-medium text-green-600">Active</p>
                </div>
            </div>
        `;
        
    } catch (err) {
        errorEl.textContent = 'Failed to load profile: ' + err.message;
        toast(err.message, 'error');
    }
}
</script>
</body>
</html>
