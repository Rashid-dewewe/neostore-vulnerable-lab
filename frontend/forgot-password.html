<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot password | NeoStore</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<link href="/css/tokens.css" rel="stylesheet"/>
</head>
<body>
<nav id="site-nav" class="border-b" style="border-color:var(--color-outline);background:var(--color-surface-container-lowest)"></nav>

<main class="max-w-sm mx-auto px-6 py-16">
  <h1 class="font-display text-2xl font-bold mb-1">Reset your password</h1>
  <p class="text-sm mb-6" style="color:var(--color-on-surface-variant)">
    Enter your email and we'll generate a reset link.
    <span class="vuln-flag block mt-2 w-fit">VULN: the "token" is base64(email:timestamp) — fully predictable, no signature, no real entropy.</span>
  </p>

  <form id="forgot-form" class="flex flex-col gap-3">
    <input id="email" type="email" required class="input" placeholder="Email"/>
    <button type="submit" class="btn-primary mt-2">Send reset link</button>
  </form>
  <pre id="result" class="text-xs font-mono mt-4 whitespace-pre-wrap"></pre>

  <hr class="my-8" style="border-color:var(--color-outline)"/>

  <h2 class="font-display text-lg font-bold mb-2">Have a token?</h2>
  <form id="reset-form" class="flex flex-col gap-3">
    <input id="token" required class="input font-mono text-xs" placeholder="reset token"/>
    <input id="new_password" type="password" required class="input" placeholder="New password"/>
    <button type="submit" class="btn-secondary mt-2">Reset password</button>
  </form>
  <p id="reset-result" class="text-sm mt-3"></p>
</main>

<script src="/js/api.js"></script>
<script>
renderNav();
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = await api('/auth/forgot-password', { method: 'POST', body: { email: document.getElementById('email').value } });
  document.getElementById('result').textContent = JSON.stringify(data, null, 2);
});
document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await api('/auth/reset-password', {
      method: 'POST',
      body: { token: document.getElementById('token').value, new_password: document.getElementById('new_password').value },
    });
    document.getElementById('reset-result').textContent = 'Password updated — try logging in.';
  } catch (err) {
    document.getElementById('reset-result').textContent = err.message;
  }
});
</script>
</body>
</html>
