<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot password | NeoStore</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="/css/tokens.css" rel="stylesheet"/>
</head>
<body>
<nav id="site-nav" class="border-b" style="border-color:var(--color-outline);background:var(--color-surface-container-lowest)"></nav>

<main class="max-w-sm mx-auto px-6 py-16">
  <h1 class="font-display text-2xl font-bold mb-1">Reset your password</h1>
  <p class="text-sm mb-6" style="color:var(--color-on-surface-variant)">Enter your registered email address to initiate verification.</p>

  <form id="forgot-form" class="flex flex-col gap-3">
    <input id="email" type="email" required class="input" placeholder="Account Email Address"/>
    <button type="submit" class="btn-primary mt-1">Generate Dispatch Request</button>
  </form>
  <p id="result" class="text-xs font-mono mt-4 text-neutral-500 whitespace-pre-wrap"></p>

  <hr class="my-8" style="border-color:var(--color-outline)"/>

  <h2 class="font-display text-lg font-bold mb-2">Apply Recovery Token</h2>
  <form id="reset-form" class="flex flex-col gap-3">
    <input id="token" required class="input font-mono text-xs" placeholder="Token ID Instance"/>
    <input id="new_password" type="password" required class="input" placeholder="New Account Password"/>
    <button type="submit" class="btn-secondary mt-2">Update Account Access</button>
  </form>
  <p id="reset-result" class="text-sm mt-3"></p>
</main>

<script src="/js/api.js"></script>
<script>
renderNav();
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const data = await api('/auth/forgot-password', { method: 'POST', body: { email: document.getElementById('email').value } });
    document.getElementById('result').textContent = data.message;
  } catch(err) {
    document.getElementById('result').textContent = err.message;
  }
});

document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await api('/auth/reset-password', {
      method: 'POST',
      body: { token: document.getElementById('token').value, new_password: document.getElementById('new_password').value },
    });
    toast('Credentials updated successfully', 'success');
    window.location.href = '/login.html';
  } catch (err) {
    document.getElementById('reset-result').style.color = 'var(--color-error)';
    document.getElementById('reset-result').textContent = err.message;
  }
});
</script>
</body>
</html>
