<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product | NeoStore</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<link href="/css/tokens.css" rel="stylesheet"/>
</head>
<body>
<nav id="site-nav" class="border-b" style="border-color:var(--color-outline);background:var(--color-surface-container-lowest)"></nav>

<main id="content" class="max-w-5xl mx-auto px-6 py-12"></main>

<script src="/js/api.js"></script>
<script>
renderNav();
const id = new URLSearchParams(location.search).get('id');

async function load() {
  try {
    const p = await api(`/products/${id}`);
    document.getElementById('content').innerHTML = `
      <div class="grid md:grid-cols-2 gap-10">
        <div class="card overflow-hidden aspect-square">
          <img src="${p.image_url}" class="w-full h-full object-cover"/>
        </div>
        <div>
          <span class="font-mono text-xs" style="color:var(--color-on-surface-variant)">${p.category || ''} · SKU ${p.sku}</span>
          <h1 class="font-display text-3xl font-bold mt-2">${p.name}</h1>
          <p class="mt-4 leading-relaxed" style="color:var(--color-on-surface-variant)">${p.description}</p>
          <div class="mt-6 font-display text-3xl font-semibold">${money(p.price)}</div>
          <div class="mt-1 text-sm" style="color:var(--color-on-surface-variant)">${p.stock} in stock</div>
          <div class="mt-6 flex items-center gap-3">
            <input id="qty" type="number" value="1" min="1" max="${p.stock}" class="input w-24"/>
            <button id="add-btn" class="btn-primary">Add to cart</button>
          </div>
          <div id="cart-message" class="mt-4 text-sm"></div>
        </div>
      </div>`;
    
    // Add event listener for the add to cart button
    document.getElementById('add-btn').addEventListener('click', async function() {
      const messageEl = document.getElementById('cart-message');
      
      // Check if user is logged in
      if (!Auth.isLoggedIn()) {
        messageEl.style.color = 'var(--color-error)';
        messageEl.textContent = 'Please log in first! Redirecting...';
        toast('Please log in first', 'error');
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 1500);
        return;
      }
      
      const quantity = parseInt(document.getElementById('qty').value);
      if (quantity < 1 || quantity > p.stock) {
        messageEl.style.color = 'var(--color-error)';
        messageEl.textContent = `Please enter a quantity between 1 and ${p.stock}`;
        return;
      }
      
      try {
        messageEl.textContent = 'Adding to cart...';
        messageEl.style.color = 'var(--color-on-surface-variant)';
        
        await api('/cart/items', { 
          method: 'POST', 
          body: { product_id: p.id, quantity: quantity } 
        });
        
        messageEl.style.color = 'var(--color-success)';
        messageEl.textContent = `✓ Added ${quantity} item(s) to cart!`;
        toast('Added to cart successfully!', 'success');
        
        // Update the quantity input to show it was added
        document.getElementById('qty').value = 1;
        
      } catch (e) {
        messageEl.style.color = 'var(--color-error)';
        messageEl.textContent = 'Error: ' + e.message;
        toast(e.message, 'error');
      }
    });
    
  } catch (e) {
    document.getElementById('content').innerHTML = `<p style="color:var(--color-error)">Error loading product: ${e.message}</p>`;
  }
}

load();
</script>
</body>
</html>
