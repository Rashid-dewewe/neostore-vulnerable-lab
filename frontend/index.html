<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NeoStore | Modern Retail Excellence</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<link href="/css/tokens.css" rel="stylesheet"/>
</head>
<body>
<nav id="site-nav" class="border-b" style="border-color:var(--color-outline);background:var(--color-surface-container-lowest)"></nav>

<header class="max-w-7xl mx-auto px-6 pt-14 pb-10">
  <h1 class="font-display text-4xl md:text-5xl font-bold tracking-tight max-w-2xl">Engineered for everyday excellence.</h1>
  <p class="mt-4 max-w-xl" style="color:var(--color-on-surface-variant)">Discover our curated collection of premium products.</p>
</header>

<section class="max-w-7xl mx-auto px-6 pb-10 flex flex-wrap gap-3 items-center">
  <input id="search-input" class="input max-w-xs" placeholder="Search products..."/>
  <select id="category-select" class="input max-w-[200px]"><option value="">All categories</option></select>
  <button id="search-btn" class="btn-secondary">Search</button>
</section>

<main class="max-w-7xl mx-auto px-6 pb-20">
  <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>
</main>

<script src="/js/api.js"></script>
<script>
renderNav('shop');

async function loadCategories() {
  const cats = await api('/products/meta/categories');
  const sel = document.getElementById('category-select');
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.slug; opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

function productCard(p) {
  return `
    <a href="/product.html?id=${p.id}" class="card overflow-hidden flex flex-col group">
      <div class="aspect-square overflow-hidden" style="background:var(--color-surface-container-low)">
        <img src="${p.image_url}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform"/>
      </div>
      <div class="p-4 flex-1 flex flex-col">
        <span class="font-mono text-xs" style="color:var(--color-on-surface-variant)">${p.category || ''}</span>
        <h3 class="font-medium mt-1 flex-1">${p.name}</h3>
        <div class="flex items-center justify-between mt-3">
          <span class="font-display font-semibold text-lg">${money(p.price)}</span>
          ${p.stock <= 5 ? `<span class="badge badge-warn">${p.stock} left</span>` : ''}
        </div>
      </div>
    </a>`;
}

async function loadProducts(params = {}) {
  const qs = new URLSearchParams(params).toString();
  const products = await api(`/products${qs ? '?' + qs : ''}`);
  document.getElementById('product-grid').innerHTML = products.map(productCard).join('') || '<p>No products found.</p>';
}

document.getElementById('search-btn').addEventListener('click', () => {
  loadProducts({
    q: document.getElementById('search-input').value || undefined,
    category: document.getElementById('category-select').value || undefined,
  });
});

loadCategories();
loadProducts();
</script>
</body>
</html>
